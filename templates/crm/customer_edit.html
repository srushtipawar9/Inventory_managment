{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Edit Customer: {{ customer.name }}</h1>
        <a href="{% url 'CustomerList' %}" class="btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to List
        </a>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">
                        <i class="fas fa-user-edit"></i> Edit Customer Details
                    </h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="name"><strong>Customer Name *</strong></label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{ customer.name }}" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="phone"><strong>Phone Number *</strong></label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       value="{{ customer.phone }}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="email">Email (Optional)</label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       value="{{ customer.email|default:'' }}">
                            </div>
                            <div class="form-group col-md-6">
                                <label for="outstanding_balance">Outstanding Balance (₹)</label>
                                <input type="number" step="0.01" class="form-control" id="outstanding_balance" 
                                       name="outstanding_balance" value="{{ customer.outstanding_balance }}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Address (Optional)</label>
                            <textarea class="form-control" id="address" name="address" rows="3">{{ customer.address|default:'' }}</textarea>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Customer
                        </button>
                        <a href="{% url 'CustomerList' %}" class="btn btn-secondary ml-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
