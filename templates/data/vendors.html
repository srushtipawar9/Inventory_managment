{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Vendors Price Compare</h1>
    <div class="btn-group" role="group" aria-label="Category filter">
      <a class="btn btn-sm {% if category == 'HYDRAULICS' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="?category=HYDRAULICS">
        Hydraulics
      </a>
      <a class="btn btn-sm {% if category == 'ALL' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="?category=ALL">
        All JCB Parts
      </a>
    </div>
  </div>

  <p class="mb-4">
    Cheapest vendor/city is marked <span class="text-success font-weight-bold"><i class="fas fa-check-circle"></i> green</span>
    and the most expensive is marked <span class="text-danger font-weight-bold"><i class="fas fa-times-circle"></i> red</span>.
  </p>

  <div id="vendors-data">
    {% include "data/vendors_partial.html" %}
  </div>
</div>

<script>
  function refreshVendorsData() {
    fetch("{% url 'VendorComparison' %}?category={{ category }}&format=json", {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        const container = document.getElementById('vendors-data');
        if (container && data.html) {
          container.innerHTML = data.html;
        }
      })
      .catch(function (error) {
        console.error('Vendor refresh failed:', error);
      });
  }

  // Poll for updates every 5 seconds without a full page reload.
  setInterval(refreshVendorsData, 5000);
  refreshVendorsData();
</script>

{% endblock %}
