{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-edit text-primary"></i> Edit Vendor: {{ vendor.name }}
        </h1>
        <a href="{% url 'VendorList' %}" class="btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to List
        </a>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">
                        <i class="fas fa-truck"></i> Edit Vendor Details
                    </h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="name"><strong>Vendor Name *</strong></label>
                                <input type="text" class="form-control" id="name" name="name"
                                       value="{{ vendor.name }}" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="city"><strong>City *</strong></label>
                                <input type="text" class="form-control" id="city" name="city"
                                       value="{{ vendor.city }}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="contact_phone">Contact Phone (Optional)</label>
                                <input type="tel" class="form-control" id="contact_phone" name="contact_phone"
                                       value="{{ vendor.contact_phone|default:'' }}">
                            </div>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Vendor
                        </button>
                        <a href="{% url 'VendorList' %}" class="btn btn-secondary ml-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
