{% extends "base.html" %}
{% load static %}
{% load humanize %}
{% block content %}

{% include "cashier/card.html" %}

<div class="container-fluid mt-2">

  <!-- Quick Actions Row -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow border-0" style="border-radius:15px;">
        <div class="card-header border-0 py-3" style="background:linear-gradient(90deg,#1a2a6c,#4e73df);border-radius:15px 15px 0 0;">
          <h6 class="m-0 font-weight-bold text-white"><i class="fas fa-bolt mr-2"></i>Quick Actions</h6>
        </div>
        <div class="card-body">
          <div class="row text-center">
            <div class="col-md-4 col-12 mb-3">
              <a href="{% url 'InputStock' %}" class="btn btn-outline-primary btn-block py-3 shadow-sm" style="border-radius:12px;">
                <i class="fas fa-plus-circle fa-2x d-block mb-2 text-primary"></i>
                <span class="font-weight-bold">Add Inventory</span>
              </a>
            </div>
            <div class="col-md-4 col-12 mb-3">
              <a href="{% url 'TotalStock' %}" class="btn btn-outline-success btn-block py-3 shadow-sm" style="border-radius:12px;">
                <i class="fas fa-warehouse fa-2x d-block mb-2 text-success"></i>
                <span class="font-weight-bold">View Stock</span>
              </a>
            </div>
            <div class="col-md-4 col-12 mb-3">
              <a href="{% url 'ReportView' %}" class="btn btn-outline-warning btn-block py-3 shadow-sm" style="border-radius:12px;">
                <i class="fas fa-chart-line fa-2x d-block mb-2 text-warning"></i>
                <span class="font-weight-bold">Financial Insights</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


</div>

{% endblock %}
